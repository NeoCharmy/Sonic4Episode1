name: Fetch Extra Game Files (js, service-worker)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download service-worker.js and js folder
      run: |
        mkdir -p extra_files/js

        # Download service-worker.js
        wget -nv --header="User-Agent: Mozilla/5.0" \
          "https://wamwoowam.co.uk/sonic4/service-worker.js" \
          -O extra_files/service-worker.js

        # Download entire js/ directory (recursive, no parent, keep structure)
        cd extra_files/js
        wget --recursive --level=1 --no-parent --no-host-directories \
             --header="User-Agent: Mozilla/5.0" \
             "https://wamwoowam.co.uk/sonic4/js/"
        # Move files up if they end up in a nested 'js' folder
        if [ -d "js" ]; then mv js/* . && rm -r js; fi
        cd ../..

    - name: Commit and push to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add extra_files/
        git commit -m "Add service-worker.js and js folder" || echo "No changes to commit"
        git push
