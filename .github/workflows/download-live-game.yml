name: Download Sonic4 Engine Files

on:
  workflow_dispatch:

jobs:
  fetch-engine:
    runs-on: ubuntu-latest
    steps:
    - name: Download _framework folder from live site
      run: |
        wget --recursive --level=1 --no-parent --no-host-directories \
             --directory-prefix=engine \
             --accept "*.js,*.wasm,*.json,*.dat,*.pdb" \
             https://wamwoowam.co.uk/sonic4/_framework/

    - name: (Fallback) Download known essential files manually
      run: |
        mkdir -p engine/_framework
        cd engine/_framework
        for file in dotnet.js dotnet.wasm dotnet.native.wasm blazor.boot.json dotnet.runtime.js icudt.dat icudt_CJK.dat; do
          wget -nv "https://wamwoowam.co.uk/sonic4/_framework/$file" || echo "Skipping $file (not found)"
        done

    - name: Upload engine artifact
      uses: actions/upload-artifact@v4
      with:
        name: sonic4-engine
        path: engine/
