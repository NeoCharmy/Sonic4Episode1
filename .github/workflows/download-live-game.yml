name: Capture Content.tar.gz (Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Capture Content.tar.gz (case‑insensitive)
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");

        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          let captured = false;

          // Intercept every response, save content.tar.gz immediately
          page.on("response", async (response) => {
            const url = response.url().toLowerCase();
            if (url.includes("/content.tar.gz")) {
              console.log("Content archive found, downloading...");
              try {
                const buffer = await response.body();
                fs.mkdirSync("sonic4-complete", { recursive: true });
                fs.writeFileSync("sonic4-complete/content.tar.gz", buffer);
                console.log("Saved content.tar.gz, size:", buffer.length);
                captured = true;
              } catch (e) {
                console.error("Failed to save content.tar.gz:", e.message);
              }
            }
          });

          await page.goto("https://wamwoowam.co.uk/sonic4/", { waitUntil: "networkidle" });
          console.log("Page loaded. Waiting up to 30 seconds for download...");

          // Wait up to 30 seconds for the file to be captured
          const start = Date.now();
          while (!captured && Date.now() - start < 30000) {
            await page.waitForTimeout(1000);
          }

          if (captured) {
            console.log("Successfully captured content.tar.gz.");
          } else {
            console.error("content.tar.gz was not captured within 30 seconds.");
            process.exit(1);
          }

          await browser.close();
        })();
        '

    - name: Split into 90 MB chunks
      run: |
        cd sonic4-complete
        split -b 90M content.tar.gz content.tar.gz.part
        rm content.tar.gz
        echo "Created chunks:"
        ls -lh content.tar.gz.part*

    - name: Commit chunks
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/content.tar.gz.part*
        git commit -m "Add split content.tar.gz chunks" || echo "Nothing to commit"
        git push
