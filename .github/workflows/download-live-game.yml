name: Fetch Missing Native WASM Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download missing .wasm files
      run: |
        # List of missing files from console errors
        FILES=(
          "dotnet.native.tirckj5p90.wasm"
          "dotnet.native.tircmj5p90.wasm"
          # Add any other missing hash names here if more appear
        )
        mkdir -p sonic4-complete/_framework
        for f in "${FILES[@]}"; do
          wget -nv --header="User-Agent: Mozilla/5.0" \
            "https://wamwoowam.co.uk/sonic4/_framework/$f" \
            -O "sonic4-complete/_framework/$f" || echo "FAILED to download $f"
        done

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/_framework/
        git commit -m "Add missing native WASM files" || echo "Nothing to commit"
        git push
