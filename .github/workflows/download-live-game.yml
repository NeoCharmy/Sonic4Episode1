name: Fetch content.tar.gz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download content.tar.gz from live site
      run: |
        mkdir -p sonic4-complete
        wget -nv --header="User-Agent: Mozilla/5.0" \
          "https://wamwoowam.co.uk/sonic4/content.tar.gz" \
          -O "sonic4-complete/content.tar.gz"

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/content.tar.gz
        git commit -m "Add content.tar.gz" || echo "Nothing to commit"
        git push
