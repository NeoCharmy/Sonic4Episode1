name: Capture and Split content.tar.gz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Capture content.tar.gz
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");

        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();

          page.on("response", (resp) => {
            const url = resp.url();
            if (url.includes("/sonic4/"))
              console.log("Response:", resp.status(), url.substring(0, 100));
          });

          await page.goto("https://wamwoowam.co.uk/sonic4/", { waitUntil: "networkidle" });

          try {
            console.log("Waiting for content.tar.gz...");
            const response = await page.waitForResponse(
              resp => resp.url().includes("/content.tar.gz"),
              { timeout: 30000 }
            );
            const buffer = await response.body();
            fs.mkdirSync("sonic4-complete", { recursive: true });
            fs.writeFileSync("sonic4-complete/content.tar.gz", buffer);
            console.log("Captured content.tar.gz, size:", buffer.length);
          } catch (e) {
            console.error("Did not capture content.tar.gz:", e.message);
            process.exit(1);
          }

          await browser.close();
        })();
        '

    - name: Split file into 90 MB chunks
      run: |
        cd sonic4-complete
        split -b 90M content.tar.gz content.tar.gz.part
        ls -lh content.tar.gz.part*

    - name: Commit chunks to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/content.tar.gz.part*
        git commit -m "Add split content.tar.gz chunks" || echo "Nothing to commit"
        git push
