name: Capture Content.tar.gz (page.request)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Download Content.tar.gz using browser context
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");

        (async () => {
          const browser = await chromium.launch();
          const context = await browser.newContext();
          const page = await context.newPage();

          // Navigate and wait for the game to set up any necessary cookies/storage
          await page.goto("https://wamwoowam.co.uk/sonic4/", { waitUntil: "networkidle" });
          console.log("Page loaded. Waiting a few seconds for auth/cookies...");
          await page.waitForTimeout(5000);

          // Now use the same browser context to fetch the archive directly
          const contentUrl = "https://wamwoowam.co.uk/sonic4/Content.tar.gz";
          console.log("Fetching:", contentUrl);
          const response = await context.request.get(contentUrl, {
            timeout: 180000   // 3 minutes for the large file
          });
          
          if (response.ok()) {
            const buffer = await response.body();
            fs.mkdirSync("sonic4-complete", { recursive: true });
            fs.writeFileSync("sonic4-complete/content.tar.gz", buffer);
            console.log("Saved content.tar.gz, size:", buffer.length);
          } else {
            console.error("Failed to download. Status:", response.status());
            process.exit(1);
          }

          await browser.close();
        })();
        '

    - name: Split into 90 MB chunks
      run: |
        cd sonic4-complete
        split -b 90M content.tar.gz content.tar.gz.part
        rm content.tar.gz
        echo "Created chunks:"
        ls -lh content.tar.gz.part*

    - name: Commit chunks
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/content.tar.gz.part*
        git commit -m "Add split content.tar.gz chunks" || echo "Nothing to commit"
        git push
