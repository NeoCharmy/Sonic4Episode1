name: Fetch Engine and Commit to Repo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download _framework and index.html from live site
      run: |
        mkdir -p engine/_framework
        cd engine
        wget -nv --header="User-Agent: Mozilla/5.0" \
             "https://wamwoowam.co.uk/sonic4/index.html" -O index.html
        cd _framework
        for file in dotnet.js dotnet.wasm dotnet.native.wasm blazor.boot.json dotnet.runtime.js dotnet.runtime.js.map icudt.dat icudt_CJK.dat; do
          wget -nv --header="User-Agent: Mozilla/5.0" \
               "https://wamwoowam.co.uk/sonic4/_framework/$file" || echo "$file not found"
        done

    - name: Commit and push to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add engine/
        git commit -m "Add engine files" || echo "No changes to commit"
        git push
