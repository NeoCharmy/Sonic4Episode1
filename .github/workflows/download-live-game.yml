name: Capture content.tar.gz v2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Capture content.tar.gz
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");

        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();

          // Log all /sonic4/ responses for visibility
          page.on("response", (resp) => {
            const url = resp.url();
            if (url.includes("/sonic4/")) {
              console.log("Response:", resp.status(), url.substring(0, 100));
            }
          });

          await page.goto("https://wamwoowam.co.uk/sonic4/", { waitUntil: "networkidle" });

          try {
            console.log("Waiting for content.tar.gz...");
            const response = await page.waitForResponse(
              resp => resp.url().includes("/content.tar.gz"),
              { timeout: 30000 }   // wait up to 30 seconds
            );
            const buffer = await response.body();
            fs.mkdirSync("sonic4-complete", { recursive: true });
            fs.writeFileSync("sonic4-complete/content.tar.gz", buffer);
            console.log("Captured content.tar.gz, size:", buffer.length);
          } catch (e) {
            console.error("Did not capture content.tar.gz. Response list above may show why.");
          }

          await browser.close();
        })();
        '

    - name: Commit and push (only if file exists)
      run: |
        if [ -f sonic4-complete/content.tar.gz ]; then
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sonic4-complete/content.tar.gz
          git commit -m "Add real content.tar.gz" || echo "Nothing to commit"
          git push
        else
          echo "content.tar.gz was not captured, skipping commit."
        fi
