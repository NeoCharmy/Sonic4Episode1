name: Capture content.tar.gz and Split

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture-and-split:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Capture content.tar.gz
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");

        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();

          page.on("response", (resp) => {
            const url = resp.url();
            if (url.includes("/sonic4/"))
              console.log("Response:", resp.status(), url.substring(0, 100));
          });

          await page.goto("https://wamwoowam.co.uk/sonic4/", { waitUntil: "networkidle" });
          console.log("Waiting 15 seconds for version check...");
          await page.waitForTimeout(15000);

          console.log("Waiting for content.tar.gz (timeout 120s)...");
          const response = await page.waitForResponse(
            resp => resp.url().includes("/content.tar.gz"),
            { timeout: 120000 }
          );
          const buffer = await response.body();
          fs.mkdirSync("sonic4-complete", { recursive: true });
          fs.writeFileSync("sonic4-complete/content.tar.gz", buffer);
          console.log("Captured content.tar.gz, size:", buffer.length);
          await browser.close();
        })();
        '

    - name: Split into 90 MB chunks and DELETE original
      run: |
        cd sonic4-complete
        split -b 90M content.tar.gz content.tar.gz.part
        # REMOVE the large original so it won't be committed
        rm content.tar.gz
        echo "Created chunks:"
        ls -lh content.tar.gz.part*

    - name: Commit only the chunks
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add sonic4-complete/content.tar.gz.part*
        git commit -m "Add split content.tar.gz chunks" || echo "Nothing to commit"
        git push
