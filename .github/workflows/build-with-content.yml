name: Mirror CheerpJ Runtime

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download CheerpJ 4.2 runtime
      run: |
        mkdir -p cheerpj/4.2
        wget -r -np -nH --cut-dirs=3 \
             -P cheerpj/4.2 \
             --no-verbose \
             https://cjrtnc.leaningtech.com/4.2/

    - name: Commit runtime
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cheerpj/
        git commit -m "Add CheerpJ 4.2 runtime" || echo "Nothing to commit"
        git push
