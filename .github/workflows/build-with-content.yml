name: Build WASM with Local Content (Final v8)

on:
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code (no submodules)
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: false

    - name: Setup .NET 7 and .NET 9 SDKs
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          7.0.x
          9.0.x

    - name: Lock main project to .NET 9
      run: |
        echo '{"sdk":{"version":"9.0.115"}}' > global.json
        dotnet --version

    - name: Clone FNA with its submodules (recursive)
      run: |
        git clone --recurse-submodules https://github.com/WamWooWam/FNA.git Submodules/FNA
        cd Submodules/FNA
        git checkout 061bd1f6e4c85b5dccc9ed7325b1043a5f9f1a6e
        # Update submodules to match this commit
        git submodule update --init --recursive
        cd ../..

    - name: Install wasm-tools for .NET 7 (temporary SDK switch)
      run: |
        cp global.json global.json.bak
        echo '{"sdk":{"version":"7.0.410"}}' > global.json
        dotnet --version
        dotnet workload install wasm-tools
        mv global.json.bak global.json

    - name: Install wasm-tools for .NET 9
      run: dotnet workload install wasm-tools

    - name: Publish WASM project
      run: |
        dotnet publish Sonic4Episode1.Wasm/Sonic4Episode1.Wasm.csproj \
          -c Release \
          -r browser-wasm \
          -o ./publish

    - name: Prepare final web folder
      shell: bash
      run: |
        mkdir -p ./wwwroot
        cp -r ./publish/* ./wwwroot/
        rm -rf ./wwwroot/content
        mkdir -p ./wwwroot/content
        echo "Put your local 'Content' folder here." > ./wwwroot/content/README.txt

    - name: Upload web game files
      uses: actions/upload-artifact@v4
      with:
        name: web-game-files
        path: ./wwwroot/
