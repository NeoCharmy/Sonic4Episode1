name: Build WASM with Local Content (LFS Fixed)

on:
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code (with LFS)
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install required workload
      run: dotnet workload install wasm-tools-net9

    - name: Setup Emscripten (official action)
      uses: emscripten-core/setup-emsdk@v2
      with:
        version: 3.1.45

    - name: Verify native libraries exist
      shell: pwsh
      run: |
        Write-Host "Checking for native .a files..."
        if (Test-Path Sonic4Episode1.Wasm/lib/wasm/SDL2.a) {
          Write-Host "SDL2.a found. Size: $( (Get-Item Sonic4Episode1.Wasm/lib/wasm/SDL2.a).Length ) bytes"
        } else {
          Write-Error "SDL2.a is missing! LFS checkout may have failed."
        }
        if (Test-Path Sonic4Episode1.Wasm/lib/wasm/FNA3D.a) { Write-Host "FNA3D.a found." } else { Write-Error "FNA3D.a missing!" }

    - name: Publish WASM project
      shell: bash
      run: |
        dotnet publish Sonic4Episode1.Wasm/Sonic4Episode1.Wasm.csproj \
          -c Release \
          -r browser-wasm \
          -o ./publish \
          -v d 2>&1

    - name: Prepare final web folder
      shell: bash
      run: |
        mkdir -p ./wwwroot
        cp -r ./publish/* ./wwwroot/
        rm -rf ./wwwroot/content
        mkdir -p ./wwwroot/content
        echo "Put your local 'Content' folder here." > ./wwwroot/content/README.txt

    - name: Upload web game files
      uses: actions/upload-artifact@v4
      with:
        name: web-game-files
        path: ./wwwroot/
