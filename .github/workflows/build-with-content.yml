name: Build WASM with Local Content (v3 - Final)

on:
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOTNET_ROOT: ${{ github.workspace }}/.dotnet  # force the installed .NET 9
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: 'recursive'

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Ensure .NET 9 is active
      shell: bash
      run: |
        # Override global.json if present, to lock the SDK version
        echo '{"sdk":{"version":"9.0.100"}}' > global.json
        # Show which dotnet is in use
        dotnet --version
        dotnet --list-sdks

    - name: Manually initialise submodules (failsafe)
      shell: bash
      run: |
        git submodule sync --recursive
        git submodule update --init --recursive --force

    - name: Verify submodules and critical files
      shell: pwsh
      run: |
        Write-Host "Listing Submodules/FNA contents:"
        if (Test-Path Submodules/FNA) {
          Get-ChildItem -Path Submodules/FNA -Recurse -File | Select-Object FullName | ForEach-Object { Write-Host $_.FullName }
        } else {
          Write-Error "Submodules/FNA folder still missing!"
        }
        Write-Host "Checking specific CS files:"
        $files = @(
          "Sonic4Episode1/appmain/gm/GMD_GAME_FLAG.cs",
          "Sonic4Episode1/appmain/gm/GMD_TASK_PRIO.cs"
        )
        foreach ($f in $files) {
          if (Test-Path $f) {
            Write-Host "Found: $f"
          } else {
            Write-Error "Missing: $f"
          }
        }

    - name: Install wasm-tools-net9 workload
      run: dotnet workload install wasm-tools-net9

    - name: Setup Emscripten
      uses: emscripten-core/setup-emsdk@v2
      with:
        version: 3.1.45

    - name: Publish WASM project (using .NET 9)
      shell: bash
      run: |
        dotnet publish Sonic4Episode1.Wasm/Sonic4Episode1.Wasm.csproj \
          -c Release \
          -r browser-wasm \
          -o ./publish

    - name: Prepare final web folder
      shell: bash
      run: |
        mkdir -p ./wwwroot
        cp -r ./publish/* ./wwwroot/
        rm -rf ./wwwroot/content
        mkdir -p ./wwwroot/content
        echo "Put your local 'Content' folder here." > ./wwwroot/content/README.txt

    - name: Upload web game files
      uses: actions/upload-artifact@v4
      with:
        name: web-game-files
        path: ./wwwroot/
