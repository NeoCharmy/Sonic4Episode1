name: Final – Download Music, Pack into Archive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all .ogg music files
      run: |
        BASE="https://wamwoowam.co.uk/sonic4/Content/SOUND"
        REFERER="https://wamwoowam.co.uk/sonic4/"
        mkdir -p sonic4-sound/SOUND

        for track in \
          S4EP1_00_Z1A1_Normal_Mixed4816 \
          S4EP1_01_Z1A2_Normal_Mixed4816 \
          S4EP1_02_Z1A3_Normal_Mixed4816 \
          S4EP1_03_Z2A1_Normal_Mixed4816 \
          S4EP1_04_Z2A2_Normal_Mixed4816 \
          S4EP1_04_Z2A2b_Normal_Mixed4816 \
          S4EP1_05_Z2A3_Normal_Mixed4816 \
          S4EP1_06_Z3A1_Normal_Mixed4816 \
          S4EP1_07_Z3A2_Normal_Mixed4816 \
          S4EP1_08_Z3A3_Normal_Mixed4816 \
          S4EP1_09_Z4A1_Normal_Mixed4816 \
          S4EP1_10_Z4A2_Normal_Mixed4816 \
          S4EP1_11_Z4A3_Normal_Mixed4816 \
          S4EP1_12_Title_Mixed4816 \
          S4EP1_13_Menu_Mixed4816 \
          S4EP1_14_SpecialStage_Mixed4816 \
          S4EP1_15_Boss1_Mixed4816 \
          S4EP1_16_Boss2_Mixed4816 \
          S4EP1_17_Final_Mixed4816 \
          S4EP1_18_Ending_Mixed4816 \
          S4EP1_19_Clear_Mixed4816 \
          S4EP1_20_Clear_Final_Mixed4816 \
          S4EP1_22_Obore_Mixed4816 \
          S4EP1_23_Invincible_Mixed4816 \
          S4EP1_24_1up_Mixed4816 \
          S4EP1_25_New_Record_4816 \
          S4EP1_26_Gameover_Mixed4816 \
          S4EP1_27_Z1A1_Speedup_Mixed4816 \
          S4EP1_28_Z1A2_Speedup_Mixed4816 \
          S4EP1_29_Z1A3_Speedup_Mixed4816 \
          S4EP1_30_Z2A1_Speedup_Mixed4816 \
          S4EP1_31_Z2A2_SpeedUp_Mixed4816 \
          S4EP1_32_Z2A3_Speedup_Mixed4816 \
          S4EP1_33_Z3A1_Speedup_Mixed4816 \
          S4EP1_34_Z3A2_Speedup_Mixed4816 \
          S4EP1_35_Z3A3_Speedup_Mixed4816 \
          S4EP1_36_Z4A1_Speedup_Mixed4816 \
          S4EP1_37_Z4A2_Speedup_Mixed4816 \
          S4EP1_38_Z4A3_Speedup_Mixed4816 \
          S4EP1_39_WorldMap_Mixed4816 \
          S4EP1_40_SuperSonic_Mixed4816 \
          S4EP1_41_CutScene_Mixed4816 \
          SNG_EMERALD; do
          wget --quiet --show-progress \
               --header="User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
               --header="Referer: $REFERER" \
               -O "sonic4-sound/SOUND/${track}.ogg" \
               "$BASE/${track}.ogg" || echo "FAILED: ${track}.ogg"
        done

        echo "Number of downloaded .ogg files: $(ls sonic4-sound/SOUND/*.ogg 2>/dev/null | wc -l)"

    - name: Create music.tar.gz archive
      run: |
        tar -czf music.tar.gz -C sonic4-sound/SOUND .
        ls -lh music.tar.gz

    - name: Commit and push archive
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add music.tar.gz
        git commit -m "Add complete music archive" || echo "Nothing to commit"
        git push

    - name: Show download link
      run: |
        echo ""
        echo ">>> Your music archive is ready:"
        echo "    https://raw.githubusercontent.com/NeoCharmy/Sonic4Episode1/main/music.tar.gz"
        echo ""
