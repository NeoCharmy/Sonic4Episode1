name: Build WASM with Local Content (FINAL – No Emscripten Action)

on:
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code (no submodules)
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: false

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Lock SDK version to .NET 9
      run: |
        echo '{"sdk":{"version":"9.0.100"}}' > global.json
        dotnet --version

    - name: Clone FNA (the only required dependency)
      run: git clone https://github.com/WamWooWam/FNA.git Submodules/FNA

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools

    - name: Publish WASM project
      run: |
        dotnet publish Sonic4Episode1.Wasm/Sonic4Episode1.Wasm.csproj \
          -c Release \
          -r browser-wasm \
          -o ./publish

    - name: Prepare final web folder
      shell: bash
      run: |
        mkdir -p ./wwwroot
        cp -r ./publish/* ./wwwroot/
        rm -rf ./wwwroot/content
        mkdir -p ./wwwroot/content
        echo "Put your local 'Content' folder here." > ./wwwroot/content/README.txt

    - name: Upload web game files
      uses: actions/upload-artifact@v4
      with:
        name: web-game-files
        path: ./wwwroot/
