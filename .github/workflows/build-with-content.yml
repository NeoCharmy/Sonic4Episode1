name: Full Standalone – Restore Index & Mirror CheerpJ

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Capture live index.html and CheerpJ resources
      run: |
        node -e '
        const { chromium } = require("playwright");
        const fs = require("fs");
        const path = require("path");

        (async () => {
          const browser = await chromium.launch();
          const context = await browser.newContext();
          const page = await context.newPage();

          // Intercept all CheerpJ CDN responses and save them locally
          page.on("response", async (response) => {
            const url = response.url();
            if (!url.startsWith("https://cjrtnc.leaningtech.com/")) return;

            try {
              const parsed = new URL(url);
              let relativePath = parsed.pathname.replace(/^\//, "");
              if (!relativePath) return;

              const outputDir = "cheerpj-local";
              const filePath = path.join(outputDir, relativePath);
              const dir = path.dirname(filePath);
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });

              const buffer = await response.body();
              fs.writeFileSync(filePath, buffer);
              console.log("Saved:", relativePath, "(" + buffer.length + " bytes)");
            } catch (e) {
              console.error("Failed to save", url, e.message);
            }
          });

          // Load your live GitHub Pages site
          await page.goto("https://neocharmy.github.io/runnersadventure/", { waitUntil: "networkidle" });
          console.log("Page loaded, waiting for CheerpJ to fully initialize...");
          await page.waitForTimeout(15000);

          // Save the live page’s HTML as index.html (restores original content)
          const html = await page.content();
          fs.writeFileSync("index.html", html);
          console.log("Restored index.html from live site.");

          await browser.close();
        })();
        '

    - name: Make index.html load CheerpJ from local folder
      run: |
        sed -i 's|https://cjrtnc.leaningtech.com/|cheerpj-local/|g' index.html

    - name: Commit restored page and runtime
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cheerpj-local/
        git add index.html
        git commit -m "Restore index.html and add local CheerpJ runtime" || echo "Nothing to commit"
        git push
