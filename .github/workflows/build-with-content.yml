name: Build WASM with Local Content (Final v2)

on:
  workflow_dispatch:

jobs:
  build-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Verify .NET version
      run: dotnet --version

    - name: Install required workload (wasm-tools-net9)
      run: dotnet workload install wasm-tools-net9

    - name: List installed workloads
      run: dotnet workload list

    - name: Setup Emscripten (official action)
      uses: emscripten-core/setup-emsdk@v2
      with:
        version: 3.1.45

    - name: Check Emscripten availability
      run: emcc --version

    - name: Publish WASM project (with detailed logs)
      shell: bash
      run: |
        dotnet publish Sonic4Episode1.Wasm/Sonic4Episode1.Wasm.csproj \
          -c Release \
          -o ./publish \
          -v detailed 2>&1

    - name: Prepare final web folder
      shell: bash
      run: |
        mkdir -p ./wwwroot
        cp -r ./publish/* ./wwwroot/
        rm -rf ./wwwroot/content
        mkdir -p ./wwwroot/content
        echo "Put your local 'Content' folder here." > ./wwwroot/content/README.txt

    - name: Upload web game files
      uses: actions/upload-artifact@v4
      with:
        name: web-game-files
        path: ./wwwroot/
